<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/style.css" rel="stylesheet">
    <title>WCB Bakery</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Boldonse&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <section class="hero">
            <img class="brd" src="images/bread1.jpg" alt="">

            <div class="hero_content">
                <h1 class="title">WCB Bakery</h1>
                <p class="text">
                    素材と触感にこだわったパンが勢ぞろい。<br>
                    毎朝仕込んで焼き上げています。<br>
                    パンと一緒に過ごす至福のひと時をお楽しみください。
                </p>
            </div>
        </section>
    </header>

    <main>
        <div class="brd_img">
            <img class="brd1" src="images/bg1.png" alt="メロンパン">
            <span class="brd_text">美味しいパンをお届け！</span>
            <img class="brd2" src="images/bg2.png" alt="パイ">
        </div>
    </main>

    <footer class="c-footer">
        <div class="c-footer__body"></div>
        <div class="c-footer__copy"><small>© WCB Bakery</small></div>
    </footer>

</body>

</html>
